appId: com.viviw.app
productName: VIVIW
copyright: Copyright © 2025 VIVIW

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/@electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/app-builder-lib/**"
  - "!**/*.ts"
  - "!**/*.map"

win:
  target:
    - target: portable
      arch:
        - x64
  sign: false
  signDlls: false
  forceCodeSigning: false

portable:
  artifactName: "${productName}-${version}-Portable.exe"

extraResources:
  - from: python
    to: python
    filter:
      - "**/*.py"
      - "**/*.bat"
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm

asar: true
compression: normal
